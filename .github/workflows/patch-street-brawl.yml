name: Patch street brawl

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - tools/patch-street-brawl.mjs
      - .github/workflows/patch-street-brawl.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply street brawl patch
        run: node tools/patch-street-brawl.mjs

      - name: Validate game script
        run: node --check js/game.js

      - name: Commit patched game script
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Apply minimal street brawl rules
          file_pattern: js/game.js
