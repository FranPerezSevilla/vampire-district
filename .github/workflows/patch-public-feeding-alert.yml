name: Patch public feeding alert

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - tools/patch-public-feeding-alert.mjs
      - .github/workflows/patch-public-feeding-alert.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply public feeding alert patch
        run: node tools/patch-public-feeding-alert.mjs

      - name: Validate game script
        run: node --check js/game.js

      - name: Commit patched game script
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Apply public feeding alert escalation
          file_pattern: js/game.js
