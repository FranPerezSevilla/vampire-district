name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install exact test dependencies
        run: npm install --ignore-scripts --no-audit --no-fund --no-package-lock
      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee unit-test.log
      - name: Upload unit test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-log
          path: unit-test.log
          retention-days: 7

  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: unit-tests
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install exact browser dependencies
        run: npm install --ignore-scripts --no-audit --no-fund --no-package-lock
      - name: Verify pinned local Phaser
        run: test -f node_modules/phaser/dist/phaser.min.js
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run release-candidate browser suite
        shell: bash
        run: |
          set -o pipefail
          timeout --signal=INT --kill-after=30s 30m npm run test:browser 2>&1 | tee browser-smoke.log
      - name: Upload browser smoke log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-log
          path: browser-smoke.log
          retention-days: 7
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Upload browser traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
