name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install exact test dependencies
        run: npm install --ignore-scripts --no-audit --no-fund --no-package-lock
      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee unit-test.log
      - name: Compile city analysis artifacts
        run: npm run city:compile -- --output-dir=city-compiler-output
      - name: Upload current-city compiler report
        uses: actions/upload-artifact@v4
        with:
          name: city-compiler-current-city
          path: city-compiler-output/
          retention-days: 14
      - name: Upload unit test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-log
          path: unit-test.log
          retention-days: 7

  browser-boot:
    runs-on: ubuntu-latest
    timeout-minutes: 14
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install exact browser dependencies
        run: npm install --ignore-scripts --no-audit --no-fund --no-package-lock
      - name: Verify pinned local Phaser
        run: test -f node_modules/phaser/dist/phaser.min.js
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run boot and presentation loops
        shell: bash
        run: |
          set -o pipefail
          timeout --signal=INT --kill-after=30s 10m npm run test:browser:boot 2>&1 | tee browser-boot.log
      - name: Upload boot diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-boot-diagnostics
          path: |
            browser-boot.log
            playwright-report/
            test-results/
          retention-days: 7

  browser-systems:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install exact browser dependencies
        run: npm install --ignore-scripts --no-audit --no-fund --no-package-lock
      - name: Verify pinned local Phaser
        run: test -f node_modules/phaser/dist/phaser.min.js
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run focused system loops
        shell: bash
        run: |
          set -o pipefail
          timeout --signal=INT --kill-after=30s 14m npm run test:browser:systems 2>&1 | tee browser-systems.log
      - name: Upload system diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-systems-diagnostics
          path: |
            browser-systems.log
            playwright-report/
            test-results/
          retention-days: 7

  browser-campaign:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install exact browser dependencies
        run: npm install --ignore-scripts --no-audit --no-fund --no-package-lock
      - name: Verify pinned local Phaser
        run: test -f node_modules/phaser/dist/phaser.min.js
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run campaign state loops
        shell: bash
        run: |
          set -o pipefail
          timeout --signal=INT --kill-after=30s 14m npm run test:browser:campaign 2>&1 | tee browser-campaign.log
      - name: Upload campaign diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-campaign-diagnostics
          path: |
            browser-campaign.log
            playwright-report/
            test-results/
          retention-days: 7

  browser-golden:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 22
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install exact browser dependencies
        run: npm install --ignore-scripts --no-audit --no-fund --no-package-lock
      - name: Verify pinned local Phaser
        run: test -f node_modules/phaser/dist/phaser.min.js
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run complete campaign golden paths
        shell: bash
        run: |
          set -o pipefail
          timeout --signal=INT --kill-after=30s 18m npm run test:browser:golden 2>&1 | tee browser-golden.log
      - name: Upload golden-path diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-golden-diagnostics
          path: |
            browser-golden.log
            playwright-report/
            test-results/
          retention-days: 7
