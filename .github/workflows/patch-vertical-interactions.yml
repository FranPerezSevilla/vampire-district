name: Patch vertical interactions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - tools/patch-vertical-interactions.mjs
      - .github/workflows/patch-vertical-interactions.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply vertical interaction patch
        run: node tools/patch-vertical-interactions.mjs

      - name: Validate game script
        run: node --check js/game.js

      - name: Commit patched game script
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Apply vertical navigation and interaction menu
          file_pattern: js/game.js
