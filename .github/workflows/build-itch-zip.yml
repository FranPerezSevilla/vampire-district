name: Build itch.io ZIP

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: ZIP file name (without .zip)
        required: true
        default: vampire-district
        type: string

jobs:
  build-zip:
    name: Package selected branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4

      - name: Validate output name
        shell: bash
        env:
          ZIP_NAME: ${{ inputs.zip_name }}
        run: |
          set -euo pipefail

          if [[ ! "$ZIP_NAME" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo 'Error: zip_name may only contain letters, numbers, dots, underscores and hyphens.'
            exit 1
          fi

      - name: Prepare itch.io build
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p itch-build

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='itch-build' \
            --exclude='node_modules' \
            --exclude='*.zip' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            ./ itch-build/

          if [[ ! -f itch-build/index.html ]]; then
            echo 'Error: index.html was not found at the root of the packaged build.'
            exit 1
          fi

      # GitHub downloads every artifact as a ZIP. Uploading the prepared
      # directory directly makes that downloaded artifact the final itch.io ZIP,
      # instead of creating a ZIP inside another ZIP.
      - name: Upload final itch.io ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.zip_name }}
          path: itch-build/
          if-no-files-found: error
          include-hidden-files: true
          compression-level: 9
          retention-days: 14
