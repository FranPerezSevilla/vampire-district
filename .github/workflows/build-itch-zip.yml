name: Build itch.io ZIP

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: ZIP file name (without .zip)
        required: true
        default: vampire-district
        type: string

jobs:
  build-zip:
    name: Package selected branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4

      - name: Prepare itch.io build
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p itch-build

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='itch-build' \
            --exclude='node_modules' \
            --exclude='*.zip' \
            ./ itch-build/

          if [[ ! -f itch-build/index.html ]]; then
            echo 'Error: index.html was not found at the root of the packaged build.'
            exit 1
          fi

      - name: Create ZIP
        shell: bash
        env:
          ZIP_NAME: ${{ inputs.zip_name }}
        run: |
          set -euo pipefail

          if [[ ! "$ZIP_NAME" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo 'Error: zip_name may only contain letters, numbers, dots, underscores and hyphens.'
            exit 1
          fi

          cd itch-build
          zip -r "../${ZIP_NAME}.zip" .

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.zip_name }}-${{ github.ref_name }}-${{ github.run_number }}
          path: ${{ inputs.zip_name }}.zip
          if-no-files-found: error
          retention-days: 14
