name: Patch district redesign

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - tools/patch-district-redesign.mjs
      - .github/workflows/patch-district-redesign.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply district redesign patch
        run: node tools/patch-district-redesign.mjs

      - name: Validate game script
        run: node --check js/game.js

      - name: Commit patched game script
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Apply district geography redesign
          file_pattern: js/game.js
