name: Apply road edge-band generator sync

on:
  push:
    branches:
      - agent/fix-road-edge-band-generator-sync
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  apply-validate-clean:
    if: ${{ github.event_name == 'push' || github.head_ref == 'agent/fix-road-edge-band-generator-sync' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-road-edge-band-generator-sync
          fetch-depth: 0

      - name: Check runner Node
        run: |
          node --version
          npm --version

      - name: Apply verified source patch
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f tools/edge-sync-small/p-00.txt ]]; then
            echo "Temporary patch already consumed."
            exit 0
          fi

          test "$(sha256sum tools/edge-sync-small/p-00.txt | cut -d' ' -f1)" = "1caa67e1f9453e33ac20f412296c5024791e44b2f487408690cbd9695de1219c"
          test "$(sha256sum tools/edge-sync-small/p-01.txt | cut -d' ' -f1)" = "25caf5abab9142fffd3ccb23da0f94924a487faf0b4d462d2a282ac1a5787136"
          test "$(sha256sum tools/edge-sync-small/p-02.txt | cut -d' ' -f1)" = "5bde88e2d0334568afca113ce82697357a10bc68b889a60645e94f229f6f3706"
          test "$(sha256sum tools/edge-sync-small/p-03.txt | cut -d' ' -f1)" = "150c39864f5e668ede6c264d760c2153552634cdb0d24d7e0fee3a869559ab9a"
          test "$(sha256sum tools/edge-sync-small/p-04.txt | cut -d' ' -f1)" = "c66d2375acebbf5f63924ef0c0ec9bee636ad54bfee67de86722744c8ff886d5"
          test "$(sha256sum tools/edge-sync-small/p-05.txt | cut -d' ' -f1)" = "bb4b1f1ea19b78a2da55ccc828b4ae9cac269be5004661d02ba0764d08d37176"
          test "$(sha256sum tools/edge-sync-small/p-06.txt | cut -d' ' -f1)" = "fd80c5945afe115adf4ed61cc7116b81f089bd18f9bfec40a6854577dcd84c67"
          test "$(sha256sum tools/edge-sync-small/p-07.txt | cut -d' ' -f1)" = "e7c27c7a5bba49cfa3374a7ad508adcf8e32bdc2228a6bd06c01e239c33c5ea2"

          cat tools/edge-sync-small/p-{00..07}.txt > /tmp/edge-sync.patch.b64
          test "$(sha256sum /tmp/edge-sync.patch.b64 | cut -d' ' -f1)" = "571ce35f04f23242bafd51f92d8cab2f1b1737c5bdc749c0058fb2a40b88fc45"
          base64 --decode /tmp/edge-sync.patch.b64 > /tmp/edge-sync.patch.gz
          gzip --test /tmp/edge-sync.patch.gz
          gzip --decompress --stdout /tmp/edge-sync.patch.gz > /tmp/edge-sync.patch
          test "$(sha256sum /tmp/edge-sync.patch | cut -d' ' -f1)" = "1eef130731a75808f434cdb75d82faa23d8a7884d2e145756c21ff6202e6a35b"

          git apply --check --verbose /tmp/edge-sync.patch
          git apply /tmp/edge-sync.patch
          rm -rf tools/edge-sync tools/edge-sync-small
          rm -f .github/workflows/export-road-edge-bands.yml
          rm -f .github/workflows/apply-edge-band-generator-sync.yml

      - name: Install dependencies
        run: npm ci

      - name: Regenerate and validate city
        run: npm run city:topology

      - name: Run unit tests
        run: npm test

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser boot tests
        run: npm run test:browser:boot

      - name: Run browser system tests
        run: npm run test:browser:systems

      - name: Run browser campaign tests
        run: npm run test:browser:campaign

      - name: Commit reproducible generator sync
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Synchronize continuous road-edge band generator"
          git push origin HEAD:agent/fix-road-edge-band-generator-sync
