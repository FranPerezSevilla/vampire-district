name: Temporary post-mission and camera patch

on:
  push:
    branches: [fix/post-mission-free-roam-camera]

permissions:
  contents: write

jobs:
  apply-patch:
    if: ${{ !contains(github.event.head_commit.message, '[auto-patch]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/post-mission-free-roam-camera
      - name: Apply exact source replacements
        run: |
          python3 - <<'PY'
          from pathlib import Path

          common_old = '''      && !this.scene.missionSystem?.failed
                && !this.scene.missionSystem?.completed'''
          common_new = '''      && !this.scene.missionSystem?.failed'''

          for filename in [
              'phaser/src/combat/CombatSystem.js',
              'phaser/src/systems/WeaponSystem.js',
              'phaser/src/combat/DrainSystem.js',
              'phaser/src/combat/PlayerDamageSystem.js',
          ]:
              path = Path(filename)
              text = path.read_text()
              if common_old not in text:
                  raise SystemExit(f'Expected completion guard not found in {filename}')
              path.write_text(text.replace(common_old, common_new, 1))

          tutorial = Path('phaser/src/tutorial/TutorialDirector.js')
          text = tutorial.read_text()
          old = '    camera.setBounds(0, 0, WORLD.width, WORLD.height);'
          new = '    this.scene.outskirtsSystem?.updatePresentation?.();'
          if old not in text:
              raise SystemExit('Expected tutorial zoom-out bounds line not found')
          tutorial.write_text(text.replace(old, new, 1))

          outskirts = Path('phaser/src/systems/OutskirtsSystem.js')
          text = outskirts.read_text()
          old = '''    if (this.scene.registry?.get?.("taskRevealActive") || this.scene.tutorialDirector?.busy) return;
              this.scene.cameras?.main?.setBounds(
                OUTER_BOUNDS.x,
                OUTER_BOUNDS.y,
                OUTER_BOUNDS.width,
                OUTER_BOUNDS.height
              );'''
          new = '''    const camera = this.scene.cameras?.main;
              camera?.setBounds(
                OUTER_BOUNDS.x,
                OUTER_BOUNDS.y,
                OUTER_BOUNDS.width,
                OUTER_BOUNDS.height
              );
              if (this.scene.registry?.get?.("taskRevealActive") || this.scene.tutorialDirector?.busy) {
                camera?.centerOn(this.scene.player.x, this.scene.player.y);
              }'''
          if old not in text:
              raise SystemExit('Expected outskirts camera block not found')
          outskirts.write_text(text.replace(old, new, 1))
          PY
      - name: Commit patched sources
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add phaser/src/combat/CombatSystem.js \
                  phaser/src/systems/WeaponSystem.js \
                  phaser/src/combat/DrainSystem.js \
                  phaser/src/combat/PlayerDamageSystem.js \
                  phaser/src/tutorial/TutorialDirector.js \
                  phaser/src/systems/OutskirtsSystem.js
          git commit -m "[auto-patch] Restore post-mission combat and stabilize camera bounds"
          git push origin HEAD:fix/post-mission-free-roam-camera
