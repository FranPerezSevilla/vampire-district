name: Finalize Foundry road simplification

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  finalize-validate-clean:
    if: ${{ github.head_ref == 'agent/simplify-foundry-road-block' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/simplify-foundry-road-block
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply Foundry topology simplification
        run: |
          python3 tools/city-compiler/apply-foundry-simplification.py
          python3 tools/city-compiler/finalize-foundry-simplification.py

      - name: Install exact test dependencies
        run: npm install --ignore-scripts --no-audit --no-fund --no-package-lock

      - name: Regenerate and validate City Topology V2
        run: npm run city:topology

      - name: Run unit tests
        run: npm test

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser boot tests
        run: npm run test:browser:boot

      - name: Run browser system tests
        run: npm run test:browser:systems

      - name: Run browser campaign tests
        run: npm run test:browser:campaign

      - name: Commit clean Foundry topology
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Simplify Foundry industrial road block"
          git push origin HEAD:agent/simplify-foundry-road-block
