name: Patch stealth rules

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - tools/patch-stealth-rules.mjs
      - .github/workflows/patch-stealth-rules.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply stealth rule patch
        run: node tools/patch-stealth-rules.mjs

      - name: Validate game script
        run: node --check js/game.js

      - name: Commit patched game script
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Apply stealth rule tweaks
          file_pattern: js/game.js
